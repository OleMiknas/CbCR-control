// ═══════════════════════════════════════════════════════════════
// PASSWORD GATE
// SHA-256 hashed — change the hash below to update the password
// Current password: cbcr2026
// ═══════════════════════════════════════════════════════════════
const PASS_HASH = "83cdffac82a82208fe49b422600851e2ab4b67542684e6b8dca9b75ed5bd927a";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function PasswordGate({ onAuth }) {
  const [pw, setPw] = useState("");
  const [error, setError] = useState(false);
  const [checking, setChecking] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    if (sessionStorage.getItem("cbcr_auth") === "1") { onAuth(); return; }
    inputRef.current?.focus();
  }, []);

  const submit = async () => {
    setChecking(true);
    setError(false);
    const hash = await sha256(pw.trim());
    if (hash === PASS_HASH) {
      sessionStorage.setItem("cbcr_auth", "1");
      onAuth();
    } else {
      setError(true);
      setPw("");
      setChecking(false);
      inputRef.current?.focus();
    }
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "#0B0F1A", fontFamily: "'Outfit', system-ui, sans-serif",
    }}>
      <div style={{ width: 380, textAlign: "center" }}>
        <svg width={44} height={44} viewBox="0 0 28 28" fill="none" style={{ marginBottom: 20 }}>
          <circle cx="14" cy="14" r="12" stroke="#C9A84C" strokeWidth="1.5" opacity="0.4" />
          <circle cx="14" cy="14" r="6" stroke="#C9A84C" strokeWidth="1" opacity="0.25" />
          <line x1="14" y1="1" x2="14" y2="7" stroke="#C9A84C" strokeWidth="1.5" strokeLinecap="round" />
          <line x1="14" y1="21" x2="14" y2="27" stroke="#C9A84C" strokeWidth="1.5" strokeLinecap="round" />
          <line x1="1" y1="14" x2="7" y2="14" stroke="#C9A84C" strokeWidth="1.5" strokeLinecap="round" />
          <line x1="21" y1="14" x2="27" y2="14" stroke="#C9A84C" strokeWidth="1.5" strokeLinecap="round" />
          <circle cx="14" cy="14" r="2.5" fill="#C9A84C" />
        </svg>
        <div style={{ fontWeight: 700, fontSize: 18, letterSpacing: "0.06em", color: "#E8ECF4", marginBottom: 4 }}>
          CbCR <span style={{ color: "#C9A84C" }}>CONTROL</span>
        </div>
        <div style={{ fontSize: 9, letterSpacing: "0.2em", color: "#6B7A96", textTransform: "uppercase", marginBottom: 32 }}>by AU Consulting</div>

        <div style={{
          background: "#111827", border: "1px solid #1E2A42", borderRadius: 8, padding: 32,
          boxShadow: "0 0 40px rgba(201,168,76,0.04)",
        }}>
          <div style={{ fontSize: 12, color: "#A0AECB", marginBottom: 16, fontWeight: 500 }}>Enter access code to continue</div>
          <input
            ref={inputRef}
            type="password"
            value={pw}
            onChange={e => { setPw(e.target.value); setError(false); }}
            onKeyDown={e => e.key === "Enter" && pw.trim() && submit()}
            placeholder="Access code"
            style={{
              width: "100%", padding: "12px 16px", background: "#162032",
              border: `1px solid ${error ? "#F87171" : "#1E2A42"}`,
              borderRadius: 4, color: "#E8ECF4", fontSize: 14, fontFamily: "'Outfit', sans-serif",
              outline: "none", boxSizing: "border-box", transition: "border-color 0.2s",
              textAlign: "center", letterSpacing: "0.15em",
            }}
          />
          {error && <div style={{ fontSize: 11, color: "#F87171", marginTop: 8, fontWeight: 500 }}>Invalid access code</div>}
          <button
            onClick={submit}
            disabled={!pw.trim() || checking}
            style={{
              width: "100%", marginTop: 14, padding: "11px 0", borderRadius: 4,
              border: `1px solid rgba(201,168,76,0.3)`, cursor: pw.trim() ? "pointer" : "not-allowed",
              background: pw.trim() ? "rgba(201,168,76,0.15)" : "#162032",
              color: pw.trim() ? "#C9A84C" : "#3E4E6A",
              fontWeight: 700, fontSize: 12, fontFamily: "'Outfit', sans-serif",
              letterSpacing: "0.08em", transition: "all 0.2s",
            }}
          >
            {checking ? "VERIFYING..." : "ENTER"}
          </button>
        </div>

        <div style={{ marginTop: 24, height: 2, width: 48, margin: "24px auto 0", background: "linear-gradient(90deg, #C9A84C, rgba(201,168,76,0.3), transparent)", borderRadius: 1 }} />
        <div style={{ fontSize: 10, color: "#3E4E6A", marginTop: 14 }}>Restricted access · Prototype demo</div>
      </div>
    </div>
  );
}

// ─── Portfolio Alerts Banner ────────────────────────────────────
function AlertsBanner({ alerts, onAlertAction }) {
  const [expanded, setExpanded] = useState(false);
  const activeAlerts = alerts.filter(a => a.status !== "resolved");
  const highCount = activeAlerts.filter(a => a.severity === "high").length;
  const medCount = activeAlerts.filter(a => a.severity === "medium").length;

  if (activeAlerts.length === 0) return null;

  return (
    <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 24px" }}>
      <div style={{
        background: highCount > 0 ? "rgba(248,113,113,0.06)" : AU.amberBg,
        border: `1px solid ${highCount > 0 ? "rgba(248,113,113,0.2)" : "rgba(251,191,36,0.2)"}`,
        borderRadius: 6, marginBottom: 20, overflow: "hidden",
        transition: "all 0.2s",
      }}>
        <div
          onClick={() => setExpanded(!expanded)}
          style={{
            padding: "12px 18px", display: "flex", alignItems: "center", justifyContent: "space-between",
            cursor: "pointer", transition: "background 0.15s",
          }}
        >
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{
              width: 28, height: 28, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center",
              background: highCount > 0 ? AU.redBg : AU.amberBg,
              border: `1px solid ${highCount > 0 ? "rgba(248,113,113,0.3)" : "rgba(251,191,36,0.3)"}`,
              fontSize: 12,
            }}>
              {highCount > 0 ? "⚠" : "⏰"}
            </div>
            <div>
              <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Outfit', sans-serif", color: AU.text }}>
                {activeAlerts.length} Active Alert{activeAlerts.length !== 1 ? "s" : ""}
              </span>
              <span style={{ fontSize: 11, color: AU.textMuted, marginLeft: 10 }}>
                {highCount > 0 && <span style={{ color: AU.red, fontWeight: 600 }}>{highCount} high</span>}
                {highCount > 0 && medCount > 0 && " · "}
                {medCount > 0 && <span style={{ color: AU.amber, fontWeight: 600 }}>{medCount} medium</span>}
              </span>
            </div>
          </div>
          <span style={{ fontSize: 10, color: AU.textMuted, fontWeight: 600, fontFamily: "'Outfit', sans-serif", letterSpacing: "0.08em" }}>
            {expanded ? "COLLAPSE ▲" : "EXPAND ▼"}
          </span>
        </div>

        {expanded && (
          <div style={{ borderTop: `1px solid ${AU.border}` }}>
            {activeAlerts.map(alert => {
              const typeConf = alertTypeConfig[alert.type] || { icon: "•", label: alert.type };
              const sevConf = severityConfig[alert.severity];
              const statConf = alertStatusConfig[alert.status];
              return (
                <div key={alert.id} style={{
                  padding: "11px 18px", display: "flex", alignItems: "center", gap: 12,
                  borderBottom: `1px solid ${AU.border}`,
                }}>
                  <span style={{ fontSize: 14, width: 24, textAlign: "center", flexShrink: 0 }}>{typeConf.icon}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: AU.gold, fontFamily: "'Outfit', sans-serif" }}>{alert.clientName}</span>
                      <Badge label={sevConf.label} color={sevConf.color} bg={sevConf.bg} />
                      <Badge label={statConf.label} color={statConf.color} bg={statConf.bg} />
                    </div>
                    <div style={{ fontSize: 12, color: AU.textSoft, lineHeight: 1.5 }}>{alert.message}</div>
                  </div>
                  <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                    {alert.status === "open" && (
                      <Button size="sm" variant="secondary" onClick={e => { e.stopPropagation(); onAlertAction(alert.id, "acknowledged"); }}>Acknowledge</Button>
                    )}
                    <Button size="sm" variant="ghost" onClick={e => { e.stopPropagation(); onAlertAction(alert.id, "resolved"); }}>Resolve</Button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// Gold accent line — the AU signature element
function GoldRule({ width = "100%", height = 2, style = {} }) {
  return <div style={{ width, height, background: `linear-gradient(90deg, ${AU.gold}, ${AU.goldLight}, transparent)`, borderRadius: 1, ...style }} />;
}

// Compass mark — simplified brand motif
function CompassMark({ size = 28 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" stroke={AU.gold} strokeWidth="1.5" opacity="0.4" />
      <circle cx="14" cy="14" r="6" stroke={AU.gold} strokeWidth="1" opacity="0.25" />
      <line x1="14" y1="1" x2="14" y2="7" stroke={AU.gold} strokeWidth="1.5" strokeLinecap="round" />
      <line x1="14" y1="21" x2="14" y2="27" stroke={AU.gold} strokeWidth="1.5" strokeLinecap="round" />
      <line x1="1" y1="14" x2="7" y2="14" stroke={AU.gold} strokeWidth="1.5" strokeLinecap="round" />
      <line x1="21" y1="14" x2="27" y2="14" stroke={AU.gold} strokeWidth="1.5" strokeLinecap="round" />
      <circle cx="14" cy="14" r="2.5" fill={AU.gold} />
    </svg>
  );
}

function Badge({ label, color, bg }) {
  return (
    <span style={{
      display: "inline-block", padding: "3px 10px", borderRadius: 3,
      fontSize: 10, fontWeight: 700, letterSpacing: "0.08em",
      color, background: bg, textTransform: "uppercase",
      fontFamily: "'Outfit', sans-serif",
    }}>
      {label}
    </span>
  );
}

function ScoreRing({ score, size = 48 }) {
  const r = (size - 6) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (score / 100) * c;
  const color = score >= 80 ? AU.green : score >= 50 ? AU.gold : score < 1 ? AU.textDim : AU.red;
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={AU.border} strokeWidth={2.5} />
        {score > 0 && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={2.5} strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" />}
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.26, fontWeight: 700, color, fontFamily: "'Outfit', sans-serif" }}>{score}</div>
    </div>
  );
}

function Card({ children, style = {}, onClick, gold = false }) {
  const [h, setH] = useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setH(true)}
      onMouseLeave={() => setH(false)}
      style={{
        background: AU.surface,
        border: `1px solid ${gold ? AU.borderGold : h && onClick ? AU.borderGold : AU.border}`,
        borderRadius: 6,
        padding: 20,
        transition: "all 0.2s ease",
        cursor: onClick ? "pointer" : "default",
        transform: h && onClick ? "translateY(-1px)" : "none",
        boxShadow: gold ? `0 0 20px ${AU.goldSubtle}` : "none",
        position: "relative",
        overflow: "hidden",
        ...style,
      }}
    >
      {gold && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: `linear-gradient(90deg, transparent, ${AU.gold}, transparent)` }} />}
      {children}
    </div>
  );
}

function Button({ children, onClick, variant = "primary", size = "md", style = {} }) {
  const [h, setH] = useState(false);
  const base = { borderRadius: 4, fontWeight: 600, cursor: "pointer", transition: "all 0.2s", fontFamily: "'Outfit', sans-serif", display: "inline-flex", alignItems: "center", gap: 6, letterSpacing: "0.02em" };
  const variants = {
    primary: { background: h ? AU.gold : AU.goldDim, color: h ? AU.navyDark : AU.gold, border: `1px solid ${h ? AU.gold : AU.borderGold}` },
    secondary: { background: h ? AU.surfaceHover : "transparent", color: AU.textSoft, border: `1px solid ${AU.border}` },
    ghost: { background: h ? AU.surfaceRaised : "transparent", color: AU.textMuted, border: "1px solid transparent" },
  };
  const sizes = { sm: { padding: "5px 14px", fontSize: 11 }, md: { padding: "8px 18px", fontSize: 12 }, lg: { padding: "10px 24px", fontSize: 13 } };
  return <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} style={{ ...base, ...variants[variant], ...sizes[size], ...style }}>{children}</button>;
}

function StatCard({ label, value, sub }) {

}

// ─── Documents Tab (Document Intelligence) ──────────────────────
function DocumentsTab() {
  const [subView, setSubView] = useState("documents");
  const [docs, setDocs] = useState(DOCUMENTS);
  const [selectedDoc, setSelectedDoc] = useState(null);
  const satisfiedCount = REQUIRED_DOCS.filter(d => d.status === "satisfied").length;
  const requiredCount = REQUIRED_DOCS.filter(d => d.required).length;
  const satisfiedRequired = REQUIRED_DOCS.filter(d => d.required && d.status === "satisfied").length;
  const completeness = Math.round((satisfiedRequired / requiredCount) * 100);

  const subTabs = [
    { key: "documents", label: "All Documents" },
    { key: "checklist", label: "Required Checklist" },
    { key: "extraction", label: "Extracted Facts" },
  ];

  return (
    <div>
      <div style={{ display: "flex", gap: 14, marginBottom: 20, flexWrap: "wrap" }}>
        <Card style={{ flex: 1, minWidth: 130 }}><StatCard label="Documents" value={docs.length} sub={`${docs.filter(d=>d.classStatus==="auto_classified").length} auto-classified`} /></Card>
        <Card gold style={{ flex: 1, minWidth: 130 }}><StatCard label="Doc Completeness" value={`${completeness}%`} sub={`${satisfiedRequired}/${requiredCount} required docs`} /></Card>
        <Card style={{ flex: 1, minWidth: 130 }}><StatCard label="Extracted Facts" value={EXTRACTED_FACTS.length} sub={`across ${docs.length} documents`} /></Card>
        <Card style={{ flex: 1, minWidth: 130 }}><StatCard label="Needs Review" value={docs.filter(d=>d.classStatus==="needs_review").length} sub="classification uncertain" /></Card>
      </div>

      <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>
        {subTabs.map(st => (
          <button key={st.key} onClick={() => setSubView(st.key)} style={{
            padding: "6px 16px", borderRadius: 3, fontSize: 11, fontWeight: 600, cursor: "pointer",
            fontFamily: "'Outfit', sans-serif", border: "none", transition: "all 0.15s",
            background: subView === st.key ? AU.goldDim : "transparent",
            color: subView === st.key ? AU.gold : AU.textMuted,
          }}>{st.label}</button>
        ))}
      </div>

      {subView === "documents" && (
        <div>
          <Card style={{ padding: 0, overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${AU.border}` }}>
                  {["Document", "Type", "Classification", "Confidence", "Uploaded By", "Date", "Size"].map(h => (
                    <th key={h} style={{ textAlign: "left", padding: "11px 14px", fontSize: 10, fontWeight: 700, color: AU.textMuted, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'Outfit', sans-serif" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {docs.map(doc => {
                  const dt = docTypeConfig[doc.type] || docTypeConfig.other;
                  const cs = classStatusConfig[doc.classStatus] || classStatusConfig.unclassified;
                  const sel = selectedDoc === doc.id;
                  return (
                    <React.Fragment key={doc.id}>
                      <tr
                        onClick={() => setSelectedDoc(sel ? null : doc.id)}
                        style={{ borderBottom: `1px solid ${AU.border}`, cursor: "pointer", transition: "background 0.15s", background: sel ? AU.surfaceRaised : "transparent" }}
                        onMouseEnter={e => { if (!sel) e.currentTarget.style.background = AU.surfaceRaised; }}
                        onMouseLeave={e => { if (!sel) e.currentTarget.style.background = "transparent"; }}
                      >
                        <td style={{ padding: "12px 14px" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 16 }}>{dt.icon}</span>
                            <div>
                              <div style={{ fontWeight: 600, fontSize: 12, fontFamily: "'Outfit', sans-serif" }}>{doc.filename}</div>
                              {doc.subtype && <div style={{ fontSize: 10, color: AU.textMuted }}>{doc.subtype}</div>}
                            </div>
                          </div>
                        </td>
                        <td style={{ padding: "12px 14px" }}>
                          <span style={{ fontSize: 11, color: dt.color, fontWeight: 600, fontFamily: "'Outfit', sans-serif" }}>{dt.label}</span>
                        </td>
                        <td style={{ padding: "12px 14px" }}><Badge label={cs.label} color={cs.color} bg={cs.bg} /></td>
                        <td style={{ padding: "12px 14px" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <div style={{ width: 40, height: 3, background: AU.border, borderRadius: 2, overflow: "hidden" }}>
                              <div style={{ width: `${doc.confidence * 100}%`, height: "100%", borderRadius: 2, background: doc.confidence > 0.85 ? AU.green : doc.confidence > 0.7 ? AU.amber : AU.red }} />
                            </div>
                            <span style={{ fontSize: 11, color: AU.textMuted, fontFamily: "'Outfit', sans-serif", fontWeight: 600 }}>{(doc.confidence * 100).toFixed(0)}%</span>
                          </div>
                        </td>
                        <td style={{ padding: "12px 14px", fontSize: 11, color: AU.textMuted }}>{doc.uploadedBy}</td>
                        <td style={{ padding: "12px 14px", fontSize: 11, color: AU.textMuted }}>{doc.uploadedAt}</td>
                        <td style={{ padding: "12px 14px", fontSize: 11, color: AU.textMuted }}>{doc.size}</td>
                      </tr>
                      {sel && (
                        <tr>
                          <td colSpan={7} style={{ padding: "0 14px 14px", background: AU.surfaceRaised, borderBottom: `1px solid ${AU.border}` }}>
                            <div style={{ padding: "12px 0", display: "flex", gap: 8, alignItems: "center" }}>
                              <span style={{ fontSize: 10, color: AU.textMuted, textTransform: "uppercase", fontWeight: 700, letterSpacing: "0.1em" }}>Reclassify:</span>
                              <select
                                value={doc.type}
                                onChange={e => setDocs(prev => prev.map(d => d.id === doc.id ? { ...d, type: e.target.value, classStatus: "manual", confidence: 1.0 } : d))}
                                style={{ background: AU.surface, border: `1px solid ${AU.border}`, borderRadius: 3, padding: "5px 10px", color: AU.text, fontSize: 11, fontFamily: "'Outfit', sans-serif" }}
                              >
                                {Object.entries(docTypeConfig).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                              </select>
                              <Button size="sm" variant="secondary">View Document</Button>
                              <Button size="sm" variant="ghost">Extract Facts</Button>
                            </div>
                            {EXTRACTED_FACTS.filter(f => f.docId === doc.id).length > 0 && (
                              <div style={{ marginTop: 4 }}>
                                <div style={{ fontSize: 10, color: AU.gold, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700, marginBottom: 8 }}>Extracted from this document</div>
                                {EXTRACTED_FACTS.filter(f => f.docId === doc.id).map(fact => (
                                  <div key={fact.id} style={{ display: "flex", gap: 10, alignItems: "center", padding: "5px 0", borderBottom: `1px solid ${AU.border}` }}>
                                    {fact.country && <span style={{ fontSize: 10, color: AU.gold, fontWeight: 700, minWidth: 20 }}>{fact.country}</span>}
                                    {!fact.country && <span style={{ fontSize: 10, color: AU.textDim, minWidth: 20 }}>—</span>}
                                    <span style={{ fontSize: 11, color: AU.textSoft, flex: 1 }}>{fact.value}</span>
                                    <span style={{ fontSize: 10, color: AU.textDim }}>{(fact.confidence * 100).toFixed(0)}%</span>
                                    {fact.page && <span style={{ fontSize: 10, color: AU.textDim }}>p.{fact.page}</span>}
                                  </div>
                                ))}
                              </div>
                            )}
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      )}

      {subView === "checklist" && (
        <div>
          <div style={{ fontSize: 10, color: AU.gold, textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700, marginBottom: 12, fontFamily: "'Outfit', sans-serif" }}>Required Document Checklist</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {REQUIRED_DOCS.map((rd, i) => {
              const dt = docTypeConfig[rd.type] || docTypeConfig.other;
              const rs = reqDocStatusConfig[rd.status];
              const linkedDoc = DOCUMENTS.find(d => d.id === rd.docId);
              return (
                <Card key={i} gold={rd.status === "missing"} style={{ padding: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{
                      width: 28, height: 28, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center",
                      background: rd.status === "satisfied" ? AU.greenBg : rd.status === "missing" ? AU.redBg : AU.amberBg,
                      border: `1px solid ${rd.status === "satisfied" ? "rgba(52,211,153,0.3)" : rd.status === "missing" ? "rgba(248,113,113,0.3)" : "rgba(251,191,36,0.3)"}`,
                      fontSize: 12, flexShrink: 0,
                    }}>
                      {rd.status === "satisfied" ? "✓" : rd.status === "missing" ? "✗" : "•"}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 14 }}>{dt.icon}</span>
                        <span style={{ fontWeight: 600, fontSize: 13, fontFamily: "'Outfit', sans-serif" }}>{rd.label}</span>
                        {rd.required && <span style={{ fontSize: 9, color: AU.red, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>Required</span>}
                        {!rd.required && <span style={{ fontSize: 9, color: AU.textDim, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>Optional</span>}
                      </div>
                      {linkedDoc && <div style={{ fontSize: 11, color: AU.textMuted, marginTop: 2 }}>{linkedDoc.filename}</div>}
                      {rd.note && <div style={{ fontSize: 11, color: AU.amber, marginTop: 3 }}>⚠ {rd.note}</div>}
                    </div>
                    <Badge label={rs.label} color={rs.color} bg={rs.bg} />
                  </div>
                </Card>
              );
            })}
          </div>
          <div style={{ marginTop: 16, padding: 16, background: AU.surface, border: `1px solid ${AU.border}`, borderRadius: 6 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <ScoreRing score={completeness} size={48} />
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Outfit', sans-serif" }}>Document Completeness: {completeness}%</div>
                <div style={{ fontSize: 11, color: AU.textMuted }}>{satisfiedRequired} of {requiredCount} required documents satisfied. {REQUIRED_DOCS.filter(d=>d.note).length > 0 && `${REQUIRED_DOCS.filter(d=>d.note).length} with coverage notes.`}</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {subView === "extraction" && (
        <div>
          <div style={{ fontSize: 10, color: AU.gold, textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700, marginBottom: 12, fontFamily: "'Outfit', sans-serif" }}>Extracted Facts & Cross-Document Intelligence</div>
          <Card style={{ padding: 0, overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${AU.border}` }}>
                  {["Source", "Type", "Country", "Finding", "Confidence", "Page"].map(h => (
                    <th key={h} style={{ textAlign: "left", padding: "11px 14px", fontSize: 10, fontWeight: 700, color: AU.textMuted, textTransform: "uppercase", letterSpacing: "0.1em", fontFamily: "'Outfit', sans-serif" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {EXTRACTED_FACTS.map(fact => {
                  const isWarning = fact.factType === "country_missing" || fact.factType === "entity_mismatch" || fact.factType === "employee_count";
                  return (
                    <tr key={fact.id} style={{ borderBottom: `1px solid ${AU.border}` }}>
                      <td style={{ padding: "10px 14px" }}>
                        <span style={{ fontSize: 11, fontWeight: 600, color: AU.textSoft }}>{fact.docName}</span>
                      </td>
                      <td style={{ padding: "10px 14px" }}>
                        <span style={{
                          fontSize: 10, padding: "2px 8px", borderRadius: 2,
                          background: isWarning ? AU.redBg : AU.surfaceRaised,
                          color: isWarning ? AU.red : AU.textMuted,
                          fontWeight: 600, fontFamily: "'Outfit', sans-serif",
                        }}>
                          {fact.factType.replace(/_/g, " ")}
                        </span>
                      </td>
                      <td style={{ padding: "10px 14px" }}>
                        {fact.country ? <span style={{ fontSize: 11, color: AU.gold, fontWeight: 700 }}>{fact.country}</span> : <span style={{ color: AU.textDim }}>—</span>}
                      </td>
                      <td style={{ padding: "10px 14px", fontSize: 12, color: isWarning ? AU.red : AU.textSoft, lineHeight: 1.5 }}>{fact.value}</td>
                      <td style={{ padding: "10px 14px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <div style={{ width: 32, height: 3, background: AU.border, borderRadius: 2, overflow: "hidden" }}>
                            <div style={{ width: `${fact.confidence * 100}%`, height: "100%", borderRadius: 2, background: fact.confidence > 0.85 ? AU.green : fact.confidence > 0.7 ? AU.amber : AU.red }} />
                          </div>
                          <span style={{ fontSize: 10, color: AU.textMuted }}>{(fact.confidence * 100).toFixed(0)}%</span>
                        </div>
                      </td>
                      <td style={{ padding: "10px 14px", fontSize: 11, color: AU.textMuted }}>{fact.page ? `p.${fact.page}` : "—"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
          <Card gold style={{ marginTop: 16, padding: 16 }}>
            <div style={{ fontSize: 10, color: AU.gold, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700, marginBottom: 8, fontFamily: "'Outfit', sans-serif" }}>AI-Assisted Summary · Draft</div>
            <div style={{ fontSize: 12, color: AU.textSoft, lineHeight: 1.8 }}>
              Three documentation gaps were identified: no tax support was found for Singapore or China, the entity list contains 15 entities while the group structure chart references 18, and the headcount breakdown shows a minor discrepancy for Singapore (48 vs 45 FTEs). The transfer pricing memo for Singapore aligns with the dataset profit figure. EU tax paid support is confirmed for NL and DE.
            </div>
            <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
              <Badge label="Draft" color={AU.amber} bg={AU.amberBg} />
              <span style={{ fontSize: 10, color: AU.textDim, lineHeight: 2 }}>Generated for advisor review — not a legal conclusion</span>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

// ─── Document Issues Tab ────────────────────────────────────────
function DocumentIssuesTab() {
  const [issues, setIssues] = useState(DOCUMENT_ISSUES);
  const [selectedId, setSelectedId] = useState(null);
  const [filterType, setFilterType] = useState("all");
  const [commentText, setCommentText] = useState("");

  const toggle = (id) => setIssues(p => p.map(i => i.id === id ? { ...i, status: i.status === "open" ? "reviewed" : i.status === "reviewed" ? "resolved" : "open" } : i));
  const ignore = (id, reason) => setIssues(p => p.map(i => i.id === id ? { ...i, status: "ignored", ignoreReason: reason } : i));

  const filteredIssues = filterType === "all" ? issues : issues.filter(i => i.ruleType === filterType);

  return (
    <div>
      <div style={{ display: "flex", gap: 14, marginBottom: 20, flexWrap: "wrap" }}>
        <Card style={{ flex: 1, minWidth: 110 }}><StatCard label="Total" value={issues.length} /></Card>
        <Card style={{ flex: 1, minWidth: 110 }}><StatCard label="High" value={issues.filter(i => i.severity === "high").length} /></Card>
        <Card style={{ flex: 1, minWidth: 110 }}><StatCard label="Open" value={issues.filter(i => i.status === "open").length} /></Card>
        <Card style={{ flex: 1, minWidth: 110 }}><StatCard label="Resolved" value={issues.filter(i => i.status === "resolved").length} /></Card>
      </div>

      <div style={{ display: "flex", gap: 4, marginBottom: 18, flexWrap: "wrap" }}>
        {[{ key: "all", label: "All Types" }, ...Object.entries(docIssueRuleTypeConfig).map(([k, v]) => ({ key: k, label: v.label }))].map(f => (
          <button key={f.key} onClick={() => setFilterType(f.key)} style={{
            padding: "5px 14px", borderRadius: 3, fontSize: 11, fontWeight: 600, cursor: "pointer",
            fontFamily: "'Outfit', sans-serif", border: "none", transition: "all 0.15s",
            background: filterType === f.key ? AU.goldDim : "transparent",
            color: filterType === f.key ? AU.gold : AU.textMuted,
          }}>{f.label}</button>
        ))}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {filteredIssues.map(issue => {
          const sev = severityConfig[issue.severity];
          const rt = docIssueRuleTypeConfig[issue.ruleType] || { label: issue.ruleType, color: AU.textMuted, bg: AU.surfaceRaised };
          const sel = selectedId === issue.id;
          const linkedDoc = issue.docId ? DOCUMENTS.find(d => d.id === issue.docId) : null;
          const dt = issue.docType ? (docTypeConfig[issue.docType] || docTypeConfig.other) : null;

          return (
            <Card key={issue.id} onClick={() => setSelectedId(sel ? null : issue.id)}
              style={{ padding: 0, cursor: "pointer", border: sel ? `1px solid ${AU.borderGold}` : undefined }}>
              <div style={{ padding: "13px 16px", display: "flex", alignItems: "flex-start", gap: 12 }}>
                <Badge label={sev.label} color={sev.color} bg={sev.bg} />
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3, flexWrap: "wrap" }}>
                    <code style={{ fontSize: 10, color: AU.textDim }}>{issue.ruleCode}</code>
                    <Badge label={rt.label} color={rt.color} bg={rt.bg} />
                    {issue.country && <span style={{ fontSize: 11, color: AU.gold, fontWeight: 600, fontFamily: "'Outfit', sans-serif" }}>{issue.country}</span>}
                    {dt && <span style={{ fontSize: 10, color: AU.textDim }}>{dt.icon} {dt.label}</span>}
                  </div>
                  <div style={{ fontSize: 12, lineHeight: 1.6, color: AU.textSoft }}>{issue.message}</div>
                  {linkedDoc && (
                    <div style={{ fontSize: 10, color: AU.textMuted, marginTop: 4 }}>
                      Linked: <span style={{ color: AU.textSoft }}>{linkedDoc.filename}</span>
                    </div>
                  )}
                  {issue.assignedTo && (
                    <div style={{ fontSize: 10, color: AU.textMuted, marginTop: 2 }}>
                      Assigned to: <span style={{ color: AU.textSoft }}>{issue.assignedTo}</span>
                    </div>
                  )}
                </div>
                <Badge
                  label={issue.status === "ignored" ? "Ignored" : issue.status}
                  color={issue.status === "resolved" ? AU.green : issue.status === "reviewed" ? AU.purple : issue.status === "ignored" ? AU.textDim : AU.textMuted}
                  bg={issue.status === "resolved" ? AU.greenBg : issue.status === "reviewed" ? AU.purpleBg : issue.status === "ignored" ? AU.surfaceRaised : AU.surfaceRaised}
                />
              </div>
              {sel && (
                <div style={{ padding: "0 16px 14px", borderTop: `1px solid ${AU.border}`, paddingTop: 12 }}>
                  <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                    <Button size="sm" onClick={e => { e.stopPropagation(); toggle(issue.id); }}>
                      {issue.status === "open" ? "Mark Reviewed" : issue.status === "reviewed" ? "Resolve" : "Reopen"}
                    </Button>
                    <Button size="sm" variant="secondary" onClick={e => { e.stopPropagation(); ignore(issue.id, "Accepted risk — advisor confirmed"); }}>
                      Ignore with Reason
                    </Button>
                    <Button size="sm" variant="secondary" onClick={e => e.stopPropagation()}>Convert to Data Request</Button>
                    {linkedDoc && <Button size="sm" variant="ghost" onClick={e => e.stopPropagation()}>View Document</Button>}
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <input
                      placeholder="Add a comment..."
                      value={commentText}
                      onChange={e => setCommentText(e.target.value)}
                      onClick={e => e.stopPropagation()}
                      style={{
                        flex: 1, padding: "7px 12px", background: AU.surfaceRaised, border: `1px solid ${AU.border}`,
                        borderRadius: 3, color: AU.text, fontSize: 12, fontFamily: "'Outfit', sans-serif", boxSizing: "border-box",
                      }}
                    />
                    <Button size="sm" variant="ghost" onClick={e => { e.stopPropagation(); setCommentText(""); }}>Post</Button>
                  </div>
                  {issue.status === "ignored" && issue.ignoreReason && (
                    <div style={{ marginTop: 8, fontSize: 11, color: AU.textMuted, fontStyle: "italic" }}>
                      Ignored: {issue.ignoreReason}
                    </div>
                  )}
                </div>
              )}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ─── Client Portal View ─────────────────────────────────────────
function ClientPortalView() {
  const [requests, setRequests] = useState(CLIENT_PORTAL_REQUESTS);
  const [expandedId, setExpandedId] = useState(null);
  const [responseTexts, setResponseTexts] = useState({});
  const [uploadedFiles, setUploadedFiles] = useState({});
  const [commentTexts, setCommentTexts] = useState({});

  const openCount = requests.reduce((s, r) => s + r.items.filter(i => i.status === "open").length, 0);
  const inProgressCount = requests.reduce((s, r) => s + r.items.filter(i => i.status === "in_progress").length, 0);
  const fulfilledCount = requests.reduce((s, r) => s + r.items.filter(i => i.status === "fulfilled").length, 0);
  const totalItems = requests.reduce((s, r) => s + r.items.length, 0);

  const handleRespond = (reqId, itemId) => {
    const key = `${reqId}-${itemId}`;
    const text = responseTexts[key];
    if (!text?.trim()) return;
    setRequests(prev => prev.map(r => r.id === reqId ? {
      ...r,
      items: r.items.map(i => i.id === itemId ? { ...i, status: "fulfilled", response: text.trim() } : i),
      status: r.items.every(i => i.id === itemId || i.status === "fulfilled") ? "fulfilled" : "in_progress",
    } : r));
    setResponseTexts(prev => ({ ...prev, [key]: "" }));
  };

  const handleFileUpload = (reqId, itemId) => {
    const key = `${reqId}-${itemId}`;
    setUploadedFiles(prev => ({ ...prev, [key]: true }));
    setRequests(prev => prev.map(r => r.id === reqId ? {
      ...r,
      items: r.items.map(i => i.id === itemId ? { ...i, status: "fulfilled", response: "File uploaded" } : i),
      status: r.items.every(i => i.id === itemId || i.status === "fulfilled") ? "fulfilled" : "in_progress",
    } : r));
  };

  const reqStatusColor = (r) => {
    if (r.items.every(i => i.status === "fulfilled")) return { label: "Completed", color: AU.green, bg: AU.greenBg };
    if (r.items.some(i => i.status === "fulfilled" || i.status === "in_progress")) return { label: "In Progress", color: AU.amber, bg: AU.amberBg };
    return { label: "Open", color: AU.textMuted, bg: AU.surfaceRaised };
  };

  const isOverdue = (date) => new Date(date) < new Date();

  return (
    <div style={{ maxWidth: 900, margin: "0 auto", padding: "0 24px" }}>
      <div style={{ padding: "36px 0 8px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
          <div style={{
            width: 36, height: 36, borderRadius: "50%", background: AU.blueBg,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 14, border: `1px solid rgba(96,165,250,0.3)`,
          }}>👤</div>
          <div>
            <div style={{ fontSize: 10, color: AU.blue, textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700, fontFamily: "'Outfit', sans-serif" }}>Client Portal</div>
            <h1 style={{ fontSize: 22, fontWeight: 700, margin: 0, fontFamily: "'Outfit', sans-serif" }}>Nordveld Group</h1>
          </div>
        </div>
        <p style={{ color: AU.textMuted, fontSize: 12, margin: "4px 0 0" }}>Nordveld Holding B.V. · FY 2025 · Public CbCR Readiness</p>
      </div>
      <GoldRule width={48} style={{ marginBottom: 24 }} />

      <div style={{ display: "flex", gap: 14, marginBottom: 28, flexWrap: "wrap" }}>
        <Card style={{ flex: 1, minWidth: 120 }}><StatCard label="Open Items" value={openCount} sub="awaiting your response" /></Card>
        <Card style={{ flex: 1, minWidth: 120 }}><StatCard label="In Progress" value={inProgressCount} sub="partially answered" /></Card>
        <Card gold style={{ flex: 1, minWidth: 120 }}><StatCard label="Completed" value={fulfilledCount} sub={`of ${totalItems} total items`} /></Card>
        <Card style={{ flex: 1, minWidth: 120 }}><StatCard label="Requests" value={requests.length} sub={`${requests.filter(r => isOverdue(r.dueDate)).length} overdue`} /></Card>
      </div>

      <div style={{ fontSize: 10, color: AU.gold, textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700, marginBottom: 14, fontFamily: "'Outfit', sans-serif" }}>Data Requests from Your Advisor</div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {requests.map(req => {
          const expanded = expandedId === req.id;
          const st = reqStatusColor(req);
          const overdue = isOverdue(req.dueDate) && !req.items.every(i => i.status === "fulfilled");

          return (
            <Card key={req.id} style={{ padding: 0, border: expanded ? `1px solid ${AU.borderGold}` : undefined }}>
              <div
                onClick={() => setExpandedId(expanded ? null : req.id)}
                style={{ padding: "16px 18px", cursor: "pointer", display: "flex", alignItems: "flex-start", gap: 14 }}
              >
                <div style={{
                  width: 32, height: 32, borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center",
                  background: st.bg, border: `1px solid ${st.color}30`, fontSize: 13, flexShrink: 0, marginTop: 2,
                }}>
                  {req.items.every(i => i.status === "fulfilled") ? "✓" : req.items.filter(i => i.status !== "open").length > 0 ? "◐" : "○"}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 700, fontSize: 14, fontFamily: "'Outfit', sans-serif" }}>{req.title}</span>
                    <Badge label={st.label} color={st.color} bg={st.bg} />
                    {overdue && <Badge label="Overdue" color={AU.red} bg={AU.redBg} />}
                  </div>
                  <div style={{ fontSize: 12, color: AU.textMuted }}>
                    Due: <span style={{ color: overdue ? AU.red : AU.textSoft, fontWeight: 600 }}>{req.dueDate}</span>
                    <span style={{ margin: "0 6px", color: AU.textDim }}>·</span>
                    {req.items.filter(i => i.status === "fulfilled").length}/{req.items.length} items completed
                  </div>
                </div>
                <span style={{ fontSize: 10, color: AU.textMuted, fontWeight: 600, marginTop: 8 }}>{expanded ? "▲" : "▼"}</span>
              </div>

              {expanded && (
                <div style={{ borderTop: `1px solid ${AU.border}` }}>
                  <div style={{ padding: "14px 18px", background: AU.surfaceRaised, borderBottom: `1px solid ${AU.border}` }}>
                    <div style={{ fontSize: 12, color: AU.textSoft, lineHeight: 1.7 }}>{req.description}</div>
                    <div style={{ fontSize: 10, color: AU.textDim, marginTop: 6 }}>Requested: {req.createdAt}</div>
                  </div>

                  {req.items.map(item => {
                    const respKey = `${req.id}-${item.id}`;
                    const fileUploaded = uploadedFiles[respKey];
                    return (
                      <div key={item.id} style={{ padding: "14px 18px", borderBottom: `1px solid ${AU.border}` }}>
                        <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
                          <div style={{
                            width: 22, height: 22, borderRadius: 11, display: "flex", alignItems: "center", justifyContent: "center",
                            background: item.status === "fulfilled" ? AU.greenBg : AU.surfaceRaised,
                            border: `1px solid ${item.status === "fulfilled" ? "rgba(52,211,153,0.3)" : AU.border}`,
                            fontSize: 10, color: item.status === "fulfilled" ? AU.green : AU.textDim, flexShrink: 0, marginTop: 1,
                          }}>
                            {item.status === "fulfilled" ? "✓" : "○"}
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                              <span style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Outfit', sans-serif" }}>{item.label}</span>
                              {item.country && <span style={{ fontSize: 10, color: AU.gold, fontWeight: 700 }}>{item.country}</span>}
                            </div>

                            {item.status === "fulfilled" && item.response && (
                              <div style={{
                                padding: "8px 12px", background: AU.greenBg, borderRadius: 4,
                                border: "1px solid rgba(52,211,153,0.15)", fontSize: 12, color: AU.green, lineHeight: 1.6, marginTop: 4,
                              }}>
                                {item.response === "File uploaded" ? "📎 File uploaded successfully" : item.response}
                              </div>
                            )}

                            {item.status !== "fulfilled" && (
                              <div style={{ marginTop: 8 }}>
                                {item.docType === "file_upload" ? (
                                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                    <div style={{
                                      flex: 1, padding: "10px 14px", background: AU.surfaceRaised,
                                      border: `1px dashed ${AU.border}`, borderRadius: 4,
                                      fontSize: 12, color: AU.textMuted, textAlign: "center", cursor: "pointer",
                                    }}
                                      onClick={e => e.stopPropagation()}
                                    >
                                      📎 Click to upload file or drag & drop
                                    </div>
                                    <Button size="sm" onClick={e => { e.stopPropagation(); handleFileUpload(req.id, item.id); }}>Upload</Button>
                                  </div>
                                ) : (
                                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                    <input
                                      placeholder="Type your response..."
                                      value={responseTexts[respKey] || ""}
                                      onChange={e => setResponseTexts(prev => ({ ...prev, [respKey]: e.target.value }))}
                                      onClick={e => e.stopPropagation()}
                                      onKeyDown={e => e.key === "Enter" && handleRespond(req.id, item.id)}
                                      style={{
                                        flex: 1, padding: "8px 12px", background: AU.surfaceRaised,
                                        border: `1px solid ${AU.border}`, borderRadius: 3, color: AU.text,
                                        fontSize: 12, fontFamily: "'Outfit', sans-serif", boxSizing: "border-box",
                                      }}
                                    />
                                    <Button size="sm" onClick={e => { e.stopPropagation(); handleRespond(req.id, item.id); }}>Submit</Button>
                                  </div>
                                )}
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}

                  <div style={{ padding: "12px 18px", background: AU.surfaceRaised }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <input
                        placeholder="Add a comment for your advisor..."
                        value={commentTexts[req.id] || ""}
                        onChange={e => setCommentTexts(prev => ({ ...prev, [req.id]: e.target.value }))}
                        onClick={e => e.stopPropagation()}
                        style={{
                          flex: 1, padding: "7px 12px", background: AU.surface,
                          border: `1px solid ${AU.border}`, borderRadius: 3, color: AU.text,
                          fontSize: 12, fontFamily: "'Outfit', sans-serif", boxSizing: "border-box",
                        }}
                      />
                      <Button size="sm" variant="ghost" onClick={e => { e.stopPropagation(); setCommentTexts(prev => ({ ...prev, [req.id]: "" })); }}>Send</Button>
                    </div>
                  </div>
                </div>
              )}
            </Card>
          );
        })}
      </div>

      <div style={{ marginTop: 28, padding: 20, background: AU.surface, border: `1px solid ${AU.border}`, borderRadius: 6, textAlign: "center" }}>
        <div style={{ fontSize: 11, color: AU.textMuted, lineHeight: 1.8 }}>
          This portal is provided by <span style={{ color: AU.gold, fontWeight: 600 }}>AU Consulting</span> for secure data exchange.<br />
          You can only see requests assigned to your organization. Internal advisor notes are not visible here.
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════
window.__APP__ = function App() {
  const [view, setView] = useState("portfolio");
  const [client, setClient] = useState(null);

  const select = (c) => { setClient(c); setView("client"); };
  const isPortal = view === "portal";

  const crumbs = [];
  if (view === "client" && client) {
    crumbs.push({ label: "Portfolio", onClick: () => setView("portfolio") });
    crumbs.push({ label: `${client.name} \u00B7 FY ${client.year}` });
  }

  return (
    <div style={{ fontFamily: "'Outfit', system-ui, sans-serif", background: AU.bg, color: AU.text, minHeight: "100vh", fontSize: 13, lineHeight: 1.5 }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <NavBar onNavigate={setView} breadcrumbs={crumbs} isPortal={isPortal} />
      <div style={{ paddingBottom: 48 }}>
        {view === "portfolio" && <PortfolioView onSelectClient={select} />}
        {view === "client" && client && <ClientDetailView client={client} />}
        {view === "portal" && <ClientPortalView />}
      </div>
    </div>
  );
}

const App = window.__APP__;

function Root() {
  const [authed, setAuthed] = useState(false);
  if (!authed) return <PasswordGate onAuth={() => setAuthed(true)} />;
  return React.createElement(App);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Root));
</script>
</body>

// ═══════════════════════════════════════════════════════════════
// PASSWORD GATE
// SHA-256 hashed — change the hash below to update the password
// Current password: cbcr2026
// ═══════════════════════════════════════════════════════════════
const PASS_HASH = "83cdffac82a82208fe49b422600851e2ab4b67542684e6b8dca9b75ed5bd927a";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function PasswordGate({ onAuth }) {
  const [pw, setPw] = useState("");
  const [error, setError] = useState(false);
  const [checking, setChecking] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    if (sessionStorage.getItem("cbcr_auth") === "1") { onAuth(); return; }
    inputRef.current?.focus();
  }, []);

  const submit = async () => {
    setChecking(true);
    setError(false);
    const hash = await sha256(pw.trim());
    if (hash === PASS_HASH) {
      sessionStorage.setItem("cbcr_auth", "1");
      onAuth();
    } else {
      setError(true);
      setPw("");
      setChecking(false);
      inputRef.current?.focus();
    }
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "#0B0F1A", fontFamily: "'Outfit', system-ui, sans-serif",
    }}>
      <div style={{ width: 380, textAlign: "center" }}>
        <svg width={44} height={44} viewBox="0 0 28 28" fill="none" style={{ marginBottom: 20 }}>
          <circle cx="14" cy="14" r="12" stroke="#C9A84C" strokeWidth="1.5" opacity="0.4" />
          <circle cx="14" cy="14" r="6" stroke="#C9A84C" strokeWidth="1" opacity="0.25" />
          <line x1="14" y1="1" x2="14" y2="7" stroke="#C9A84C" strokeWidth="1.5" strokeLinecap="round" />
          <line x1="14" y1="21" x2="14" y2="27" stroke="#C9A84C" strokeWidth="1.5" strokeLinecap="round" />
          <line x1="1" y1="14" x2="7" y2="14" stroke="#C9A84C" strokeWidth="1.5" strokeLinecap="round" />
          <line x1="21" y1="14" x2="27" y2="14" stroke="#C9A84C" strokeWidth="1.5" strokeLinecap="round" />
          <circle cx="14" cy="14" r="2.5" fill="#C9A84C" />
        </svg>
        <div style={{ fontWeight: 700, fontSize: 18, letterSpacing: "0.06em", color: "#E8ECF4", marginBottom: 4 }}>
          CbCR <span style={{ color: "#C9A84C" }}>CONTROL</span>
        </div>
        <div style={{ fontSize: 9, letterSpacing: "0.2em", color: "#6B7A96", textTransform: "uppercase", marginBottom: 32 }}>by AU Consulting</div>

        <div style={{
          background: "#111827", border: "1px solid #1E2A42", borderRadius: 8, padding: 32,
          boxShadow: "0 0 40px rgba(201,168,76,0.04)",
        }}>
          <div style={{ fontSize: 12, color: "#A0AECB", marginBottom: 16, fontWeight: 500 }}>Enter access code to continue</div>
          <input
            ref={inputRef}
            type="password"
            value={pw}
            onChange={e => { setPw(e.target.value); setError(false); }}
            onKeyDown={e => e.key === "Enter" && pw.trim() && submit()}
            placeholder="Access code"
            style={{
              width: "100%", padding: "12px 16px", background: "#162032",
              border: `1px solid ${error ? "#F87171" : "#1E2A42"}`,
              borderRadius: 4, color: "#E8ECF4", fontSize: 14, fontFamily: "'Outfit', sans-serif",
              outline: "none", boxSizing: "border-box", transition: "border-color 0.2s",
              textAlign: "center", letterSpacing: "0.15em",
            }}
          />
          {error && <div style={{ fontSize: 11, color: "#F87171", marginTop: 8, fontWeight: 500 }}>Invalid access code</div>}
          <button
            onClick={submit}
            disabled={!pw.trim() || checking}
            style={{
              width: "100%", marginTop: 14, padding: "11px 0", borderRadius: 4,
              border: `1px solid rgba(201,168,76,0.3)`, cursor: pw.trim() ? "pointer" : "not-allowed",
              background: pw.trim() ? "rgba(201,168,76,0.15)" : "#162032",
              color: pw.trim() ? "#C9A84C" : "#3E4E6A",
              fontWeight: 700, fontSize: 12, fontFamily: "'Outfit', sans-serif",
              letterSpacing: "0.08em", transition: "all 0.2s",
            }}
          >
            {checking ? "VERIFYING..." : "ENTER"}
          </button>
        </div>

        <div style={{ marginTop: 24, height: 2, width: 48, margin: "24px auto 0", background: "linear-gradient(90deg, #C9A84C, rgba(201,168,76,0.3), transparent)", borderRadius: 1 }} />
        <div style={{ fontSize: 10, color: "#3E4E6A", marginTop: 14 }}>Restricted access · Prototype demo</div>
      </div>
    </div>
  );
}

function ScoreRing({ score, size = 48 }) {
  const r = (size - 6) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (score / 100) * c;
  const color = score >= 80 ? AU.green : score >= 50 ? AU.gold : score < 1 ? AU.textDim : AU.red;
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={AU.border} strokeWidth={2.5} />
        {score > 0 && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={2.5} strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" />}
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.26, fontWeight: 700, color, fontFamily: "'Outfit', sans-serif" }}>{score}</div>
    </div>
  );
}

          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14, fontFamily: "'Outfit', sans-serif" }}>New Data Request</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <input placeholder="e.g. Missing entity details for Singapore" style={{ width: "100%", padding: "8px 12px", background: AU.surfaceRaised, border: `1px solid ${AU.border}`, borderRadius: 3, color: AU.text, fontSize: 12, fontFamily: "'Outfit', sans-serif", boxSizing: "border-box" }} />
            <div style={{ display: "flex", gap: 10 }}>
              <select style={{ flex: 1, padding: "8px 12px", background: AU.surfaceRaised, border: `1px solid ${AU.border}`, borderRadius: 3, color: AU.text, fontSize: 12, fontFamily: "'Outfit', sans-serif" }}>
                <option>Jurisdiction...</option>
                {JURISDICTION_DATA.map(j => <option key={j.country}>{j.country} - {j.countryName}</option>)}
              </select>
              <input type="date" style={{ flex: 1, padding: "8px 12px", background: AU.surfaceRaised, border: `1px solid ${AU.border}`, borderRadius: 3, color: AU.text, fontSize: 12, fontFamily: "'Outfit', sans-serif", boxSizing: "border-box" }} />
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <Button size="sm" onClick={() => setShowForm(false)}>Send Request</Button>
              <Button size="sm" variant="ghost" onClick={() => setShowForm(false)}>Cancel</Button>
            </div>
          </div>
        </Card>
      )}
      {DATA_REQUESTS.map(req => (
        <Card key={req.id} style={{ marginBottom: 8 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 13, fontFamily: "'Outfit', sans-serif", marginBottom: 3 }}>{req.title}</div>
              <div style={{ fontSize: 11, color: AU.textMuted }}><span style={{ color: AU.gold, fontWeight: 600 }}>{req.country}</span> \u00B7 Due: {req.dueDate} \u00B7 Fields: {req.fields.join(", ")}</div>
            </div>
            <Badge label={req.status === "in_progress" ? "In Progress" : "Open"} color={req.status === "in_progress" ? AU.amber : AU.textMuted} bg={req.status === "in_progress" ? AU.amberBg : AU.surfaceRaised} />
          </div>
        </Card>
      ))}
    </div>
  );
}

function ReportTab({ client }) {
  const [gen, setGen] = useState(false);
  const [done, setDone] = useState(false);
  const go = () => { setGen(true); setTimeout(() => { setGen(false); setDone(true); }, 2000); };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <div style={{ fontSize: 10, color: AU.gold, textTransform: "uppercase", letterSpacing: "0.15em", fontWeight: 700, marginBottom: 4, fontFamily: "'Outfit', sans-serif" }}>Readiness Report</div>
          <p style={{ fontSize: 12, color: AU.textMuted, margin: 0 }}>Generate a professional PDF for client delivery.</p>
        </div>
        <Button onClick={go} style={{ opacity: gen ? 0.6 : 1 }}>{gen ? "Generating..." : done ? "Regenerate" : "Generate Report"}</Button>
      </div>

      {done && (
        <Card gold style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{ width: 44, height: 44, borderRadius: 6, background: AU.goldDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, border: `1px solid ${AU.borderGold}` }}>📑</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 13, fontFamily: "'Outfit', sans-serif" }}>CbCR Readiness Report - {client.name}</div>
              <div style={{ fontSize: 11, color: AU.textMuted }}>Generated just now \u00B7 v1 \u00B7 4 pages</div>
            </div>
            <Button size="sm" variant="secondary">Download PDF</Button>
          </div>
        </Card>
      )}

      <Card>
        <div style={{ fontSize: 10, color: AU.textMuted, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 16, fontFamily: "'Outfit', sans-serif", fontWeight: 600 }}>Report Preview</div>
        <div style={{ background: AU.surfaceRaised, borderRadius: 6, padding: 24, border: `1px solid ${AU.border}` }}>
          <div style={{ textAlign: "center", marginBottom: 24, paddingBottom: 20, borderBottom: `1px solid ${AU.border}` }}>
            <CompassMark size={32} />
            <div style={{ fontSize: 9, color: AU.gold, textTransform: "uppercase", letterSpacing: "0.2em", marginTop: 8, fontWeight: 700 }}>CbCR Control \u00B7 Readiness Report</div>
            <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Outfit', sans-serif", marginTop: 8 }}>{client.legalName}</div>
            <div style={{ fontSize: 12, color: AU.textMuted, marginTop: 4 }}>Public Country-by-Country Reporting \u00B7 FY {client.year}</div>
            <GoldRule width={60} style={{ margin: "12px auto 0" }} />
          </div>

          <div style={{ display: "flex", gap: 28, marginBottom: 24, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 10, color: AU.textMuted, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.1em" }}>Readiness</div>
              <ScoreRing score={client.readinessScore} size={56} />
            </div>
            <div>
              <div style={{ fontSize: 10, color: AU.textMuted, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.1em" }}>Jurisdictions</div>
              <div style={{ fontSize: 26, fontWeight: 700, fontFamily: "'Outfit', sans-serif" }}>{client.jurisdictions}</div>
            </div>
            <div>
              <div style={{ fontSize: 10, color: AU.textMuted, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.1em" }}>Open Issues</div>
              <div style={{ fontSize: 26, fontWeight: 700, fontFamily: "'Outfit', sans-serif", color: AU.red }}>{VALIDATION_ISSUES.filter(i=>i.status==="open").length}</div>
            </div>
            <div>
              <div style={{ fontSize: 10, color: AU.textMuted, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.1em" }}>Scope</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: AU.green, marginTop: 10 }}>In Scope</div>
            </div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 10, fontFamily: "'Outfit', sans-serif" }}>Issue Summary</div>
            {VALIDATION_ISSUES.slice(0, 3).map(issue => (
              <div key={issue.id} style={{ display: "flex", gap: 10, alignItems: "flex-start", padding: "8px 0", borderBottom: `1px solid ${AU.border}` }}>
                <Badge label={severityConfig[issue.severity].label} color={severityConfig[issue.severity].color} bg={severityConfig[issue.severity].bg} />
                <span style={{ fontSize: 11, lineHeight: 1.6, color: AU.textSoft }}>{issue.message}</span>
              </div>
            ))}
            <div style={{ fontSize: 11, color: AU.textMuted, marginTop: 8 }}>+ {VALIDATION_ISSUES.length - 3} more (see full report)</div>
          </div>

          <div style={{ fontSize: 10, color: AU.textDim, textAlign: "center", paddingTop: 14, borderTop: `1px solid ${AU.border}` }}>
            Generated by CbCR Control \u00B7 AU Consulting \u00B7 {new Date().toLocaleDateString()} \u00B7 Confidential
          </div>
        </div>
      </Card>
    </div>
  );
}

// APP
// ═══════════════════════════════════════════════════════════════
window.__APP__ = function App() {
  const [view, setView] = useState("portfolio");
  const [client, setClient] = useState(null);

  const select = (c) => { setClient(c); setView("client"); };

  const crumbs = [];
  if (view === "client" && client) {
    crumbs.push({ label: "Portfolio", onClick: () => setView("portfolio") });
    crumbs.push({ label: `${client.name} \u00B7 FY ${client.year}` });
  }

  return (
    <div style={{ fontFamily: "'Outfit', system-ui, sans-serif", background: AU.bg, color: AU.text, minHeight: "100vh", fontSize: 13, lineHeight: 1.5 }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <NavBar onNavigate={setView} breadcrumbs={crumbs} />
      <div style={{ paddingBottom: 48 }}>
        {view === "portfolio" && <PortfolioView onSelectClient={select} />}
        {view === "client" && client && <ClientDetailView client={client} />}
      </div>
    </div>
  );
}

const App = window.__APP__;

function Root() {
  const [authed, setAuthed] = useState(false);
  if (!authed) return <PasswordGate onAuth={() => setAuthed(true)} />;
  return React.createElement(App);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Root));
</script>
</body>
